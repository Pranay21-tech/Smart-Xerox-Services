<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Payment | Smart Xerox</title>

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #edf2f7, #f7fafc);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.pay-card {
    width: 420px;
    background: white;
    padding: 40px;
    border-radius: 18px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.12);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Lock */
.lock-icon {
    font-size: 52px;
    color: #2E8B57;
    margin-bottom: 12px;
}

/* Title */
h2 {
    margin: 0;
    color: #1f2933;
    font-weight: 600;
}

.desc {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 28px;
}

/* Amount */
.amount-box {
    background: linear-gradient(135deg, #2E8B57, #3cb371);
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 25px;
    font-size: 22px;
    font-weight: 600;
    color: white;
}

/* Inputs */
input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    margin-bottom: 18px;
    font-size: 15px;
    transition: all 0.25s ease;
}

input:focus {
    outline: none;
    border-color: #2E8B57;
    box-shadow: 0 0 0 4px rgba(46,139,87,0.18);
}

/* Button */
.pay-button {
    background: linear-gradient(135deg, #2E8B57, #3cb371);
    color: white;
    padding: 16px;
    border-radius: 14px;
    border: none;
    width: 100%;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 12px 25px rgba(46,139,87,0.4);
}

.pay-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 30px rgba(46,139,87,0.5);
}

/* Footer */
.secure-badge {
    font-size: 13px;
    color: #6b7280;
    margin-top: 18px;
}

.secure-badge span {
    color: #2E8B57;
    font-weight: 600;
}
</style>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

<div class="pay-card">

    <div class="lock-icon">🔒</div>
    <h2>Secure Payment</h2>
    <p class="desc">Complete your document printing payment safely.</p>

    <div class="amount-box">Amount: ₹{{ amount }}</div>

    <input type="text" id="custName" placeholder="Enter Your Name" required>
    <input type="tel" id="custPhone" placeholder="Enter Your WhatsApp Number (10 digits)" required>
    <input type="email" id="custEmail" placeholder="Enter Your Email" required>

    <button class="pay-button" onclick="startPayment()">Pay Now</button>

<div class="secure-badge">
    🔐 128-bit SSL Encrypted · Trusted by <span>Razorpay</span>
</div>

</div>
<script>
function startPayment() {

    let name = document.getElementById("custName").value.trim();
    let email = document.getElementById("custEmail").value.trim();

    if (!name || !email) {
        alert("Please enter your Name and Email.");
        return;
    }

    var options = {
        "key": "{{ razorpay_key_id }}",
        "amount": "{{ amount }}00",
        "currency": "INR",
        "name": "Smart Xerox Services",
        "description": "Document Print Payment",

        "handler": function (response) {
            // Redirect ONLY after successful payment
            window.location.href =
                `/payment/success/?order_id={{ order_id }}&payment_id=${response.razorpay_payment_id}`;
        },

        "prefill": {
            name: name,
            email: email
        }
    };

    var rzp1 = new Razorpay(options);
    rzp1.open();
}
</script>
</body>
</html>
