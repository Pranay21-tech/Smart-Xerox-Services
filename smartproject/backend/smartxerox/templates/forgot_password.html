<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.reset-box{
    width:350px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    text-align:center;
}

.reset-box h2{
    margin-bottom:20px;
}

.input-group{
    position:relative;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.eye-icon{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#555;
}

button{
    width:100%;
    padding:10px;
    background:#e60023;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#c4001d;
}


</style>

</head>

<body>

<div class="reset-box">

<form method="POST">
{% csrf_token %}

<h2>Reset Password</h2>

<input type="email" name="email" placeholder="Enter your email" required>

<div class="input-group">
<input type="password" id="password" name="password" placeholder="Enter new password" required>
<i class="fa-solid fa-eye eye-icon" onclick="togglePassword('password', this)"></i>
</div>

<div class="input-group">
<input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm password" required>
<i class="fa-solid fa-eye eye-icon" onclick="togglePassword('confirmPassword', this)"></i>
</div>

<button type="submit">Reset Password</button>

</form>
<a href="/main/" class="back-btn">Back</a>
</div>

<script>

function togglePassword(id, icon){

    const input = document.getElementById(id);

    if(input.type === "password"){
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    }else{
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }

}
document.querySelector("form").onsubmit = function(){

let p1 = document.getElementById("password").value;
let p2 = document.getElementById("confirmPassword").value;

if(p1 !== p2){
alert("Passwords do not match");
return false;
}

}
</script>
</body>
</html>
