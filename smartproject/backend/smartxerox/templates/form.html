                        </header>
                        <hr>
                        <hr>
                        <br><br>
                    <form id="signupForm" method="POST">
                            <!-- CSRF token is handled via meta tag and AJAX header, not needed in form for AJAX submission -->
                            <div class="form">
                                <h2>Sign Up Here</h2>
                                <input type="text" id="firstName" name="firstname" placeholder="First Name" required>
                                <input type="text" id="lastName" name="lastname" placeholder="Last Name" required>
                                <input type="email" id="signEmail" name="email" placeholder="Enter Email..." required>
                               <div class="password-field">
<input type="password" id="signPassword" name="password" placeholder="Password" required>
<i class="fa-solid fa-eye eye-icon" onclick="togglePassword('signPassword', this)"></i>
</div>

<div class="password-field">
<input type="password" id="signConfirmPassword" name="confirm_password" placeholder="Confirm Password" required>
<i class="fa-solid fa-eye eye-icon" onclick="togglePassword('signConfirmPassword', this)"></i>
</div>
                                <button type="submit" class="button1">Sign Up</button>
                                <br><br>
                                <p class="link">
                                    Already have an account?
                                    <a href="{% url 'index' %}">Login</a>
                                </p>
                                <p class="liw">Or Signup With</p>
                                <div class="google-btn">
  <a href="{% url 'social:begin' 'google-oauth2' %}">
    <img src="https://developers.google.com/identity/images/btn_google_signin_dark_normal_web.png"
         alt="Sign in with Google">
  </a>
</div>
                            </div>
                        </form>
                    </div>
<script>
document.querySelector("#signupForm").addEventListener("submit", async function(e){
    e.preventDefault();

    let p1 = document.getElementById("signPassword").value;
    let p2 = document.getElementById("signConfirmPassword").value;

    if(p1 !== p2){
        alert("Passwords do not match");
        return;
    }

    const formData = new FormData(this);

    const response = await fetch("/signup/", {
        method: "POST",
        headers: {
            "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').getAttribute("content")
        },
        body: formData
    });

    const data = await response.json();

    if(data.status === "exists"){
        alert("User already exists");
    }
    else if(data.status === "weak_password"){
        alert("Password must be at least 8 characters");
    }
    else if(data.status === "success"){
        window.location.href = "/main/";
    }
});

const response = await fetch("/signup/", {
    method: "POST",
    headers: {
        "X-CSRFToken": document.querySelector('meta[name="csrf-token"]').content
    },
    body: formData
});

const text = await response.text();
console.log("SERVER RESPONSE:", text);
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>
